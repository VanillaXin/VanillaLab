<!DOCTYPE html>
<html lang="zh-Hans" data-season="spring" data-night-mode="auto">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>香草芯 · 设定浏览</title>
  <script>
    (function () {
      var s = localStorage.getItem("banira-season") || "spring";
      var n = localStorage.getItem("banira-night-mode") || "auto";
      document.documentElement.setAttribute("data-season", s);
      document.documentElement.setAttribute("data-night-mode", n);
    })();
  </script>
  <link rel="stylesheet" href="assets/themes.css">
  <link rel="stylesheet" href="assets/style.css">
  <script src="assets/theme.js"></script>
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="brand-row">
          <div class="brand-text">
            <h1>香草芯</h1>
            <p>Vanilla Xin · 设定库</p>
          </div>
          <button type="button" class="sidebar-collapse-btn" id="sidebar-collapse-btn" aria-label="折叠侧栏" aria-expanded="true" title="折叠侧栏"><span class="ui-chevron ui-chevron--left" aria-hidden="true"></span></button>
        </div>
      </div>
      <nav class="nav-scroll" id="nav-root" aria-label="设定导航"></nav>
    </aside>
    <main class="main">
      <header class="toolbar">
        <div class="toolbar-start">
          <button type="button" class="sidebar-expand-btn" id="sidebar-expand-btn" aria-label="展开侧栏" title="展开侧栏" hidden><span class="ui-chevron ui-chevron--right" aria-hidden="true"></span></button>
          <button type="button" class="menu-toggle" id="menu-toggle" aria-label="打开菜单">☰</button>
          <h2 id="page-title">加载中…</h2>
        </div>
        <div class="toolbar-search-wrap">
          <input type="search" id="doc-search" class="doc-search-input" placeholder="搜索设定…（Ctrl+K）" autocomplete="off" disabled aria-controls="search-results" aria-expanded="false" />
          <div class="search-results" id="search-results" role="listbox" hidden></div>
        </div>
        <div class="toolbar-actions">
          <span class="live-badge" id="live-badge"></span>
          <button type="button" class="theme-trigger" id="theme-trigger" aria-haspopup="dialog" aria-controls="theme-modal">主题</button>
        </div>
      </header>
      <div class="content-wrap">
        <article class="article" id="article"></article>
      </div>
    </main>
  </div>

  <div class="theme-modal" id="theme-modal" hidden>
    <div class="theme-modal__backdrop" id="theme-modal-backdrop"></div>
    <div class="theme-modal__panel" role="dialog" aria-modal="true" aria-labelledby="theme-modal-title">
      <header class="theme-modal__header">
        <h3 id="theme-modal-title">主题</h3>
        <button type="button" class="theme-modal__close" id="theme-modal-close" aria-label="关闭">×</button>
      </header>
      <section class="theme-modal__section">
        <span class="theme-modal__label">季节</span>
        <div class="season-picker" id="season-picker" role="group" aria-label="季节主题"></div>
      </section>
      <section class="theme-modal__section">
        <span class="theme-modal__label">外观</span>
        <div class="appearance-picker" id="appearance-picker" role="group" aria-label="外观模式">
          <button type="button" class="appearance-btn" data-night="auto">自动</button>
          <button type="button" class="appearance-btn" data-night="light">浅色</button>
          <button type="button" class="appearance-btn" data-night="dark">深色</button>
        </div>
      </section>
    </div>
  </div>

  <div class="diagram-viewer" id="diagram-viewer" hidden>
    <div class="diagram-viewer__backdrop" id="diagram-viewer-backdrop"></div>
    <div class="diagram-viewer__panel" role="dialog" aria-modal="true" aria-labelledby="diagram-viewer-title">
      <header class="diagram-viewer__header">
        <h3 id="diagram-viewer-title">图表</h3>
        <div class="diagram-viewer__tools">
          <button type="button" class="diagram-viewer__tool" id="diagram-zoom-out" aria-label="缩小">−</button>
          <span class="diagram-viewer__zoom" id="diagram-zoom-label">100%</span>
          <button type="button" class="diagram-viewer__tool" id="diagram-zoom-in" aria-label="放大">+</button>
          <button type="button" class="diagram-viewer__tool diagram-viewer__tool--text" id="diagram-zoom-fit" aria-label="适应窗口">适应</button>
        </div>
        <button type="button" class="diagram-viewer__close" id="diagram-viewer-close" aria-label="关闭">×</button>
      </header>
      <div class="diagram-viewer__stage" id="diagram-viewer-stage">
        <div class="diagram-viewer__canvas" id="diagram-viewer-canvas"></div>
      </div>
      <p class="diagram-viewer__hint">拖动平移 · 滚轮缩放 · 双击重置</p>
    </div>
  </div>

  <script src="assets/app.js" defer></script>
</body>
</html>
